{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login | Bobbin{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center">Login to Bobbin</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}

        <div class="d-grid">
            <button type="submit" class="btn btn-primary">Login</button>
        </div>
    </form>

    <div class="mt-3 text-center">
        <a href="{% url 'password_reset' %}">Forgot password?</a><br>
        <span>New here? <a href="{% url 'register' %}">Register</a></span>
    </div>
</div>
{% endblock %}
